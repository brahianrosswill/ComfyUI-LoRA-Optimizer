<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#533483;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>
  <rect x="0" y="188" width="900" height="4" rx="2" fill="url(#accent)"/>
  <!-- Decorative circles -->
  <circle cx="780" cy="40" r="80" fill="url(#glow)" opacity="0.4"/>
  <circle cx="120" cy="160" r="60" fill="url(#glow)" opacity="0.3"/>
  <!-- LoRA merge icon -->
  <g transform="translate(60, 60)">
    <path d="M0,40 Q20,0 40,40 Q60,80 80,40" stroke="#e94560" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M10,40 Q30,10 50,40 Q70,70 90,40" stroke="#533483" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M5,40 Q25,5 45,40 Q65,75 85,40" stroke="#8e44ad" stroke-width="3.5" fill="none"/>
  </g>
  <!-- Title -->
  <text x="180" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Z-Image LoRA Merger</text>
  <text x="180" y="125" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#8892b0" letter-spacing="0.5">Smart LoRA merging for ComfyUI</text>
  <!-- Tags -->
  <rect x="180" y="140" width="100" height="26" rx="13" fill="#e94560" opacity="0.15"/>
  <text x="230" y="158" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#e94560" text-anchor="middle" font-weight="600">6 Nodes</text>
  <rect x="290" y="140" width="130" height="26" rx="13" fill="#533483" opacity="0.15"/>
  <text x="355" y="158" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle" font-weight="600">TIES Merging</text>
  <rect x="430" y="140" width="130" height="26" rx="13" fill="#0f3460" opacity="0.3"/>
  <text x="495" y="158" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#64ffda" text-anchor="middle" font-weight="600">Auto-Optimizer</text>
</svg>
