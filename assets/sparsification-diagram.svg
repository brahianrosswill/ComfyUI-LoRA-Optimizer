<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620">
  <defs>
    <linearGradient id="spbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="900" height="620" rx="12" fill="url(#spbg)"/>

  <text x="450" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#f59e0b" text-anchor="middle" font-weight="700" letter-spacing="2">DARE / DELLA SPARSIFICATION</text>

  <!-- ===== TWO LORA INPUTS ===== -->
  <rect x="30" y="48" width="165" height="172" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="112" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle" font-weight="600">TWO LORA DIFFS</text>

  <!-- LoRA A bars -->
  <text x="46" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#60a5fa">LoRA A</text>
  <g transform="translate(44, 94)">
    <line x1="0" y1="28" x2="138" y2="28" stroke="#334155" stroke-width="0.5" stroke-dasharray="2,3"/>
    <!-- positions: agree, agree, CONFLICT, agree, CONFLICT, unique-A, agree, CONFLICT -->
    <rect x="0"   y="6"  width="10" height="22" rx="2" fill="#60a5fa" opacity="0.8"/>
    <rect x="18"  y="12" width="10" height="16" rx="2" fill="#60a5fa" opacity="0.8"/>
    <rect x="36"  y="4"  width="10" height="24" rx="2" fill="#60a5fa" opacity="0.8"/>
    <rect x="54"  y="16" width="10" height="12" rx="2" fill="#60a5fa" opacity="0.8"/>
    <rect x="72"  y="28" width="10" height="18" rx="2" fill="#60a5fa" opacity="0.8"/>
    <rect x="90"  y="10" width="10" height="18" rx="2" fill="#60a5fa" opacity="0.8"/>
    <rect x="108" y="14" width="10" height="14" rx="2" fill="#60a5fa" opacity="0.8"/>
    <rect x="126" y="2"  width="10" height="26" rx="2" fill="#60a5fa" opacity="0.8"/>
  </g>

  <!-- LoRA B bars -->
  <text x="46" y="146" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#f87171">LoRA B</text>
  <g transform="translate(44, 152)">
    <line x1="0" y1="0" x2="138" y2="0" stroke="#334155" stroke-width="0.5" stroke-dasharray="2,3"/>
    <!-- same positions: agree(+), agree(+), CONFLICT(-), agree(+), CONFLICT(-), zero, agree(+), CONFLICT(-) -->
    <rect x="0"   y="0"  width="10" height="16" rx="2" fill="#f87171" opacity="0.8"/>
    <rect x="18"  y="0"  width="10" height="10" rx="2" fill="#f87171" opacity="0.8"/>
    <rect x="36"  y="0"  width="10" height="20" rx="2" fill="#f87171" opacity="0.6"/>
    <rect x="54"  y="0"  width="10" height="8"  rx="2" fill="#f87171" opacity="0.8"/>
    <rect x="72"  y="0"  width="10" height="14" rx="2" fill="#f87171" opacity="0.6"/>
    <rect x="90"  y="-1" width="10" height="2"  rx="1" fill="#f87171" opacity="0.2"/>
    <rect x="108" y="0"  width="10" height="10" rx="2" fill="#f87171" opacity="0.8"/>
    <rect x="126" y="0"  width="10" height="22" rx="2" fill="#f87171" opacity="0.6"/>
  </g>

  <!-- Conflict markers under the pairs -->
  <g transform="translate(44, 186)">
    <text x="5"   y="10" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#22c55e" text-anchor="middle">+/+</text>
    <text x="23"  y="10" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#22c55e" text-anchor="middle">+/+</text>
    <text x="41"  y="10" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#e94560" text-anchor="middle" font-weight="700">+/-</text>
    <text x="59"  y="10" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#22c55e" text-anchor="middle">+/+</text>
    <text x="77"  y="10" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#e94560" text-anchor="middle" font-weight="700">-/+</text>
    <text x="95"  y="10" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#64748b" text-anchor="middle">only</text>
    <text x="113" y="10" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#22c55e" text-anchor="middle">+/+</text>
    <text x="131" y="10" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#e94560" text-anchor="middle" font-weight="700">+/-</text>
  </g>
  <text x="112" y="210" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">3 conflict positions, 5 agreeing</text>

  <!-- ===== STANDARD PATH (top) ===== -->
  <!-- Arrow from input to standard -->
  <line x1="195" y1="104" x2="218" y2="104" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="218,100 226,104 218,108" fill="#94a3b8"/>

  <text x="450" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle" font-weight="600">STANDARD: drops everywhere</text>

  <!-- Standard DARE card -->
  <rect x="228" y="62" width="210" height="100" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="333" y="82" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="700">DARE</text>
  <text x="244" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#ccd6f6">Random Bernoulli mask</text>
  <text x="244" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#ccd6f6">Equal drop chance per element</text>
  <text x="244" y="128" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#ccd6f6">Rescale survivors by 1/density</text>
  <text x="244" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#f59e0b">Unbiased: E[output] = input</text>

  <!-- Standard DELLA card -->
  <rect x="228" y="172" width="210" height="100" rx="10" fill="#1e293b" stroke="#c084fc" stroke-width="1.5"/>
  <text x="333" y="192" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#c084fc" text-anchor="middle" font-weight="700">DELLA</text>
  <text x="244" y="210" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#ccd6f6">Rank elements by magnitude</text>
  <text x="244" y="224" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#ccd6f6">Low-magnitude = high drop prob</text>
  <text x="244" y="238" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#ccd6f6">Per-element rescale: 1/(1-p_i)</text>
  <text x="244" y="258" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#c084fc">Keeps signal, drops noise</text>

  <!-- Arrow to standard output -->
  <line x1="438" y1="134" x2="456" y2="134" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="456,130 464,134 456,138" fill="#94a3b8"/>

  <!-- Standard output card -->
  <rect x="466" y="62" width="200" height="130" rx="10" fill="#1e293b" stroke="#e94560" stroke-width="1.5"/>
  <text x="566" y="82" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#e94560" text-anchor="middle" font-weight="600">RESULT: blind drops</text>

  <!-- Standard output bars: dropped randomly from ALL positions -->
  <g transform="translate(484, 92)">
    <line x1="0" y1="28" x2="160" y2="28" stroke="#334155" stroke-width="0.5" stroke-dasharray="2,3"/>
    <!-- pos 1 (agree) - KEPT -->
    <rect x="0"   y="6"  width="10" height="22" rx="2" fill="#64ffda" opacity="0.8"/>
    <!-- pos 2 (agree) - DROPPED! wasted -->
    <rect x="20"  y="24" width="10" height="4"  rx="1" fill="#e94560" opacity="0.35"/>
    <!-- pos 3 (conflict) - KEPT but not targeted -->
    <rect x="40"  y="4"  width="10" height="24" rx="2" fill="#64ffda" opacity="0.8"/>
    <!-- pos 4 (agree) - DROPPED! wasted -->
    <rect x="60"  y="24" width="10" height="4"  rx="1" fill="#e94560" opacity="0.35"/>
    <!-- pos 5 (conflict) - DROPPED (good) -->
    <rect x="80"  y="24" width="10" height="4"  rx="1" fill="#475569" opacity="0.3"/>
    <!-- pos 6 (unique) - DROPPED! wasted -->
    <rect x="100" y="24" width="10" height="4"  rx="1" fill="#e94560" opacity="0.35"/>
    <!-- pos 7 (agree) - KEPT -->
    <rect x="120" y="14" width="10" height="14" rx="2" fill="#64ffda" opacity="0.8"/>
    <!-- pos 8 (conflict) - DROPPED (good) -->
    <rect x="140" y="24" width="10" height="4"  rx="1" fill="#475569" opacity="0.3"/>
  </g>

  <!-- Legend for dropped markers -->
  <g transform="translate(484, 136)">
    <rect x="0" y="0" width="8" height="8" rx="2" fill="#e94560" opacity="0.35"/>
    <text x="12" y="8" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#e94560">dropped (agreeing/unique — wasted!)</text>
  </g>
  <g transform="translate(484, 150)">
    <rect x="0" y="0" width="8" height="8" rx="2" fill="#475569" opacity="0.3"/>
    <text x="12" y="8" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#94a3b8">dropped (conflict — useful)</text>
  </g>
  <text x="566" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#e94560" text-anchor="middle">Loses unique contributions</text>

  <!-- ===== SEPARATOR ===== -->
  <line x1="30" y1="290" x2="870" y2="290" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
  <rect x="380" y="280" width="140" height="20" rx="6" fill="#0f172a"/>
  <text x="450" y="294" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#22c55e" text-anchor="middle" font-weight="700">vs</text>

  <!-- ===== CONFLICT-AWARE PATH (bottom) ===== -->
  <text x="450" y="318" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="600">CONFLICT-AWARE: drops only where LoRAs fight</text>

  <!-- Step 1: Conflict Mask -->
  <rect x="30" y="332" width="220" height="130" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="140" y="352" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="700">Step 1: Detect Conflicts</text>

  <text x="46" y="372" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#ccd6f6">Compare sign of each LoRA's diff</text>
  <text x="46" y="388" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#ccd6f6">at every weight position:</text>

  <!-- Mask visualization -->
  <g transform="translate(50, 398)">
    <!-- same-sign = safe (green check) -->
    <rect x="0"   y="0" width="14" height="14" rx="3" fill="#22c55e" opacity="0.2"/>
    <text x="7"   y="11" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#22c55e" text-anchor="middle">ok</text>
    <rect x="20"  y="0" width="14" height="14" rx="3" fill="#22c55e" opacity="0.2"/>
    <text x="27"  y="11" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#22c55e" text-anchor="middle">ok</text>
    <!-- conflict = red X -->
    <rect x="40"  y="0" width="14" height="14" rx="3" fill="#e94560" opacity="0.3"/>
    <text x="47"  y="11" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#e94560" text-anchor="middle" font-weight="700">!</text>
    <rect x="60"  y="0" width="14" height="14" rx="3" fill="#22c55e" opacity="0.2"/>
    <text x="67"  y="11" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#22c55e" text-anchor="middle">ok</text>
    <rect x="80"  y="0" width="14" height="14" rx="3" fill="#e94560" opacity="0.3"/>
    <text x="87"  y="11" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#e94560" text-anchor="middle" font-weight="700">!</text>
    <rect x="100" y="0" width="14" height="14" rx="3" fill="#22c55e" opacity="0.2"/>
    <text x="107" y="11" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#22c55e" text-anchor="middle">ok</text>
    <rect x="120" y="0" width="14" height="14" rx="3" fill="#22c55e" opacity="0.2"/>
    <text x="127" y="11" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#22c55e" text-anchor="middle">ok</text>
    <rect x="140" y="0" width="14" height="14" rx="3" fill="#e94560" opacity="0.3"/>
    <text x="147" y="11" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#e94560" text-anchor="middle" font-weight="700">!</text>
  </g>
  <text x="140" y="448" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#22c55e" text-anchor="middle">Conflict mask: only 3 of 8 positions</text>

  <!-- Arrow -->
  <line x1="250" y1="397" x2="268" y2="397" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="268,393 276,397 268,401" fill="#94a3b8"/>

  <!-- Step 2: Selective Sparsify -->
  <rect x="278" y="332" width="250" height="130" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="403" y="352" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="700">Step 2: Sparsify Conflicts Only</text>

  <text x="294" y="374" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#ccd6f6">Apply DARE or DELLA but only</text>
  <text x="294" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#ccd6f6">at conflict-mask positions.</text>
  <text x="294" y="410" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#ccd6f6">Same-sign positions: pass through</text>
  <text x="294" y="426" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#ccd6f6">Unique positions: pass through</text>
  <line x1="293" y1="434" x2="513" y2="434" stroke="#334155" stroke-width="0.5"/>
  <text x="294" y="450" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#f59e0b">Only interference gets treated</text>

  <!-- Arrow -->
  <line x1="528" y1="397" x2="546" y2="397" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="546,393 554,397 546,401" fill="#94a3b8"/>

  <!-- Step 3: Result -->
  <rect x="556" y="332" width="314" height="130" rx="10" fill="#1e293b" stroke="#64ffda" stroke-width="1.5"/>
  <text x="713" y="352" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64ffda" text-anchor="middle" font-weight="600">RESULT: targeted drops</text>

  <!-- Conflict-aware output bars -->
  <g transform="translate(574, 364)">
    <line x1="0" y1="28" x2="280" y2="28" stroke="#334155" stroke-width="0.5" stroke-dasharray="2,3"/>
    <!-- pos 1 (agree) - KEPT fully -->
    <rect x="0"   y="6"  width="10" height="22" rx="2" fill="#64ffda" opacity="0.8"/>
    <text x="15"  y="20" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#22c55e">100%</text>
    <!-- pos 2 (agree) - KEPT fully -->
    <rect x="40"  y="12" width="10" height="16" rx="2" fill="#64ffda" opacity="0.8"/>
    <text x="55"  y="20" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#22c55e">100%</text>
    <!-- pos 3 (CONFLICT) - SPARSIFIED -->
    <rect x="80"  y="24" width="10" height="4"  rx="1" fill="#f59e0b" opacity="0.4"/>
    <text x="95"  y="20" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#f59e0b">drop</text>
    <!-- pos 4 (agree) - KEPT fully -->
    <rect x="120" y="16" width="10" height="12" rx="2" fill="#64ffda" opacity="0.8"/>
    <text x="135" y="20" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#22c55e">100%</text>
    <!-- pos 5 (CONFLICT) - SPARSIFIED -->
    <rect x="160" y="24" width="10" height="4"  rx="1" fill="#f59e0b" opacity="0.4"/>
    <text x="175" y="20" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#f59e0b">drop</text>
    <!-- pos 6 (unique) - KEPT fully -->
    <rect x="200" y="10" width="10" height="18" rx="2" fill="#64ffda" opacity="0.8"/>
    <text x="215" y="20" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#22c55e">100%</text>
    <!-- pos 7 (agree) - KEPT fully -->
    <rect x="240" y="14" width="10" height="14" rx="2" fill="#64ffda" opacity="0.8"/>
    <text x="255" y="20" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#22c55e">100%</text>
  </g>

  <!-- Conflict-aware result labels -->
  <g transform="translate(574, 410)">
    <rect x="0" y="0" width="8" height="8" rx="2" fill="#64ffda" opacity="0.8"/>
    <text x="12" y="8" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#64ffda">kept untouched (agree / unique)</text>
  </g>
  <g transform="translate(574, 424)">
    <rect x="0" y="0" width="8" height="8" rx="2" fill="#f59e0b" opacity="0.4"/>
    <text x="12" y="8" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#f59e0b">sparsified (conflict only)</text>
  </g>
  <text x="713" y="450" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#64ffda" text-anchor="middle">Unique contributions fully preserved</text>

  <!-- ===== Bottom summary ===== -->
  <rect x="30" y="478" width="840" height="56" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="450" y="496" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">
    <tspan fill="#f59e0b" font-weight="600">Standard (dare / della):</tspan> drops weights blindly everywhere — fast, good baseline
  </text>
  <text x="450" y="514" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">
    <tspan fill="#22c55e" font-weight="600">Conflict-aware (dare_conflict / della_conflict):</tspan> only sparsifies where LoRAs push in opposite directions — preserves unique features
  </text>
  <text x="450" y="528" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Single-LoRA prefixes: conflict mask is empty, so zero sparsification applied (correct by construction)</text>

  <!-- ===== Bottom: TIES interaction ===== -->
  <rect x="30" y="546" width="840" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="450" y="566" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">
    <tspan fill="#f59e0b" font-weight="600">TIES mode:</tspan> DARE/DELLA replaces the trim step
    <tspan dx="20" fill="#64ffda" font-weight="600">Other modes:</tspan> applied as preprocessing before merge
  </text>
  <text x="450" y="586" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">
    <tspan fill="#c084fc" font-weight="600">DARE:</tspan> random dropout
    <tspan dx="12" fill="#c084fc" font-weight="600">DELLA:</tspan> magnitude-aware dropout (keeps important weights, drops noise)
    <tspan dx="12" fill="#64748b">|  density = keep rate (default 0.7)</tspan>
  </text>
</svg>
